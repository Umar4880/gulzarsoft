version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    (): pythonjsonlogger.json.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(filename)s %(lineno)d %(message)s"

handlers:
  queue:
    class: logging.handlers.QueueHandler
    queue: ext://app.utils.logging.log_queue
    level: DEBUG

loggers:
  "": 
    handlers: [queue]
    level: INFO 

  uvicorn:
    handlers: [queue]
    level: WARNING
    propagate: false

  uvicorn.access:
    handlers: [queue]
    level: WARNING
    propagate: false

  httpx:
    handlers: [queue]
    level: WARNING
    propagate: false

  httpcore:
    handlers: [queue]
    level: WARNING
    propagate: false

  app:
    handlers: [queue]
    level: INFO 
    propagate: false 